services:
  # Database Service
  db:
    image: postgres:15-alpine
    container_name: borrowed-book-db
    environment:
      POSTGRES_DB: borrowed_book
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432" # Host uses 5433, Container stays 5432
    volumes:
      - db-data:/var/lib/postgresql/data

  # Backend Service
  backend:
    build: 
      context: ./Backend 
      dockerfile: Dockerfile
    container_name: backend-api
    restart: always
    env_file:
      - ./Backend/.env
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/borrowed_book
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: miniopassword
      FRONTEND_URL: http://localhost:3000
    ports:
      - "3001:3001"
    depends_on:
      - db

  # Frontend Service
  frontend:
    build:
      context: ./frontend 
      dockerfile: Dockerfile
    container_name: frontend-app
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.local
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      - backend

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    container_name: minio-storage
    ports:
      - "7000:9001" # Web UI
      - "7001:9000" # API
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: miniopassword
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001" --address ":9000"
    restart: always
volumes:
  db-data: 
  minio-data: